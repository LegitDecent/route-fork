name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '23 5 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to the Security tab
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      # CodeQL autobuild runs `go build`, which needs the Fyne cgo deps.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
