name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: macos-amd64
          - goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o proxy-manager-${{ matrix.suffix }}${{ matrix.ext }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-manager-${{ matrix.suffix }}
          path: proxy-manager-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## Install

            Download the binary for your platform from the **Assets** section below.

            ### macOS
            ```bash
            # Apple Silicon (M1/M2/M3)
            chmod +x proxy-manager-macos-arm64
            sudo mv proxy-manager-macos-arm64 /usr/local/bin/proxy-manager

            # Intel
            chmod +x proxy-manager-macos-amd64
            sudo mv proxy-manager-macos-amd64 /usr/local/bin/proxy-manager
            ```

            ### Linux
            ```bash
            # x86_64
            chmod +x proxy-manager-linux-amd64
            sudo mv proxy-manager-linux-amd64 /usr/local/bin/proxy-manager

            # ARM64
            chmod +x proxy-manager-linux-arm64
            sudo mv proxy-manager-linux-arm64 /usr/local/bin/proxy-manager
            ```

            ### Windows
            Download `proxy-manager-windows-amd64.exe`, rename it to `proxy-manager.exe`,
            and move it to a folder in your `PATH` (e.g. `C:\Windows\System32\`).

            ---

            ### Man page (macOS / Linux — optional)
            ```bash
            sudo install -m644 docs/proxy-manager.1 /usr/local/share/man/man1/
            man proxy-manager
            ```

            ---

            ### nmap
            The **built-in TCP scanner works with no extra installs.**
            nmap is only needed if you want to use nmap mode:
            - macOS: `brew install nmap`
            - Debian/Ubuntu: `sudo apt install nmap`
            - Fedora: `sudo dnf install nmap`
            - Windows: `winget install nmap`
