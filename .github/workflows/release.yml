name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64

          # Native arm64 Linux runner (GitHub-hosted).
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            suffix: linux-arm64

          # macos-latest is Apple Silicon (arm64) — native build.
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: macos-arm64

          # Intel macOS build, cross-compiled on the arm64 runner (clang is a
          # universal cross-compiler; macOS frameworks are universal). Required
          # for Intel Macs — they cannot run the arm64 binary (Rosetta 2 only
          # translates x86_64 → arm64, never the other direction).
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: macos-amd64

          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      # Fyne needs OpenGL + X11 headers on Linux. apt-get update is required on
      # the arm64 runner (its package cache isn't pre-warmed like ubuntu-latest).
      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      # Fyne needs GCC (MinGW) on Windows for CGO
      - name: Add MinGW to PATH (Windows)
        if: matrix.goos == 'windows'
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o rofk-${{ matrix.suffix }}${{ matrix.ext || '' }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rofk-${{ matrix.suffix }}
          path: rofk-${{ matrix.suffix }}${{ matrix.ext || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release and upload assets
      id-token: write       # cosign keyless signing + provenance OIDC
      attestations: write   # SLSA build provenance attestation
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: sha256sum rofk-* > SHA256SUMS

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/rofk.sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign artifacts (keyless / Sigstore)
        working-directory: dist
        run: |
          shopt -s nullglob
          for f in rofk-* SHA256SUMS rofk.sbom.spdx.json; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem"
          done

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: 'dist/rofk-*'

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body: |
            ## Install

            Download the binary for your platform from the **Assets** section below.

            **Verify your download** (optional but recommended):
            - Checksums: `sha256sum -c SHA256SUMS` (after downloading `SHA256SUMS`).
            - Signature (Sigstore): `cosign verify-blob rofk-<platform> --signature rofk-<platform>.sig --certificate rofk-<platform>.pem --certificate-identity-regexp '.*' --certificate-oidc-issuer https://token.actions.githubusercontent.com`.
            - Build provenance: `gh attestation verify rofk-<platform> --repo ${{ github.repository }}`.
            - `SBOM` (SPDX) is attached as `rofk.sbom.spdx.json`.

            ### macOS
            Apple Silicon (M1/M2/M3) → `rofk-macos-arm64`.
            Intel → `rofk-macos-amd64`.
            ```bash
            chmod +x rofk-macos-arm64        # or rofk-macos-amd64 on Intel
            sudo mv rofk-macos-arm64 /usr/local/bin/rofk
            ```

            ### Linux
            x86_64 → `rofk-linux-amd64`.   arm64 (e.g. Raspberry Pi, ARM servers) → `rofk-linux-arm64`.
            ```bash
            chmod +x rofk-linux-amd64        # or rofk-linux-arm64 on ARM
            sudo mv rofk-linux-amd64 /usr/local/bin/rofk
            ```

            ### Windows
            Download `rofk-windows-amd64.exe`, rename it to `rofk.exe`,
            and move it to a folder in your `PATH` (e.g. `C:\Windows\System32\`).

            ---

            ### Man page (macOS / Linux — optional)
            ```bash
            sudo install -m644 docs/rofk.1 /usr/local/share/man/man1/
            man rofk
            ```

            ---

            ### nmap
            The **built-in TCP scanner works with no extra installs.**
            nmap is only needed for nmap scanning mode:
            - macOS: `brew install nmap`
            - Debian/Ubuntu: `sudo apt install nmap`
            - Fedora: `sudo dnf install nmap`
            - Windows: `winget install nmap`
