name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64

          # macos-latest is Apple Silicon (arm64).
          # Intel Mac users can run this transparently via Rosetta 2.
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: macos-arm64

          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # Fyne needs OpenGL + X11 headers on Linux
      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      # Fyne needs GCC (MinGW) on Windows for CGO
      - name: Add MinGW to PATH (Windows)
        if: matrix.goos == 'windows'
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o rofk-${{ matrix.suffix }}${{ matrix.ext || '' }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rofk-${{ matrix.suffix }}
          path: rofk-${{ matrix.suffix }}${{ matrix.ext || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## Install

            Download the binary for your platform from the **Assets** section below.

            ### macOS (Apple Silicon + Intel via Rosetta 2)
            ```bash
            chmod +x rofk-macos-arm64
            sudo mv rofk-macos-arm64 /usr/local/bin/rofk
            ```
            Works natively on M1/M2/M3. Intel Macs run it automatically via Rosetta 2.

            ### Linux (x86_64)
            ```bash
            chmod +x rofk-linux-amd64
            sudo mv rofk-linux-amd64 /usr/local/bin/rofk
            ```

            ### Windows
            Download `rofk-windows-amd64.exe`, rename it to `rofk.exe`,
            and move it to a folder in your `PATH` (e.g. `C:\Windows\System32\`).

            ---

            ### Man page (macOS / Linux — optional)
            ```bash
            sudo install -m644 docs/rofk.1 /usr/local/share/man/man1/
            man rofk
            ```

            ---

            ### nmap
            The **built-in TCP scanner works with no extra installs.**
            nmap is only needed for nmap scanning mode:
            - macOS: `brew install nmap`
            - Debian/Ubuntu: `sudo apt install nmap`
            - Fedora: `sudo dnf install nmap`
            - Windows: `winget install nmap`
